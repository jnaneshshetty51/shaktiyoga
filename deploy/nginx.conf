# Nginx configuration for Shakti Yoga
# Place this file at /etc/nginx/sites-available/shakti-yoga
# Then create symlink: ln -s /etc/nginx/sites-available/shakti-yoga /etc/nginx/sites-enabled/
# Remove default: rm /etc/nginx/sites-enabled/default

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name shaktiyoga.in www.shaktiyoga.in;

    # For Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shaktiyoga.in www.shaktiyoga.in;

    # SSL Configuration (update after running certbot)
    ssl_certificate /etc/letsencrypt/live/shaktiyoga.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shaktiyoga.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Logging
    access_log /var/log/nginx/shakti-yoga-access.log;
    error_log /var/log/nginx/shakti-yoga-error.log;

    # Max upload size
    client_max_body_size 50M;

    # Proxy to Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # MinIO Console (optional - only if you want web access)
    # Uncomment and update if needed
    # location /minio-console/ {
    #     proxy_pass http://localhost:9001/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

